systems:
  DuckDB:
    cases:
      Join4: |
        SELECT *
        FROM store_sales ss
        JOIN customer c
            ON ss.ss_customer_sk = c.c_customer_sk
        JOIN date_dim d
            ON ss.ss_sold_date_sk = d.d_date_sk
        JOIN item i
            ON ss.ss_item_sk = i.i_item_sk;

      Join5: |
        SELECT *
